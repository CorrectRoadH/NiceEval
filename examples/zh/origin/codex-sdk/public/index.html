<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex SDK example</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 96px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
  #log { display: flex; flex-direction: column; gap: 10px; }
  .msg {
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 90%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user { align-self: flex-end; background: #2563eb; color: white; }
  .msg.assistant { align-self: flex-start; background: white; border: 1px solid #ddd; }
  .msg.error { align-self: flex-start; background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
  .item {
    align-self: flex-start;
    max-width: 90%;
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 12px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
  }
  .item.pending { border-style: dashed; opacity: 0.8; }
  .item summary { cursor: pointer; font-weight: 600; }
  .item pre { margin: 6px 0 0; white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto; }
  .usage { align-self: flex-start; font-size: 11px; color: #999; }
  form {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #ddd;
  }
  form > div { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; width: 100%; }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { background: #93b4f0; cursor: not-allowed; }
  #threadInfo { font-size: 12px; color: #999; margin-top: 8px; }
</style>
</head>
<body>
<main>
  <h1>Codex SDK example</h1>
  <p class="subtitle">
    发自然语言编码请求(比如"创建一个文件"),后端用 Codex SDK 的 thread.runStreamed() 真调用 Codex,
    在 workspace/ 目录下真实读写文件、跑命令,ThreadEvent 一边产生一边经 SSE 推到这里。
  </p>
  <div id="log"></div>
  <div id="threadInfo"></div>
</main>
<form id="composer">
  <div>
    <input id="input" type="text" placeholder="例如:创建一个文件叫 notes.txt" autocomplete="off" />
    <button id="send" type="submit">发送</button>
  </div>
</form>
<script>
  const log = document.getElementById("log");
  const form = document.getElementById("composer");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const threadInfo = document.getElementById("threadInfo");

  // thread_id 由前端持有:第一轮 thread.started 事件里发下来,之后每轮带回给
  // 服务端 resumeThread。服务端完全无状态。
  let threadId = null;

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    log.appendChild(div);
    div.scrollIntoView({ behavior: "smooth", block: "end" });
    return div;
  }

  // Codex 的"工具调用"就是 ThreadItem 本身(command_execution / file_change /
  // mcp_tool_call / web_search / todo_list)。item.started 先挂一个进行中的
  // 占位,item.updated / item.completed 按 item.id 原地更新。
  const itemEls = new Map();

  function describeItem(item) {
    switch (item.type) {
      case "command_execution":
        return {
          title: "$ " + item.command,
          body: (item.aggregated_output || "") +
            (item.exit_code !== undefined && item.exit_code !== null ? "\n(exit " + item.exit_code + ")" : ""),
        };
      case "file_change":
        return {
          title: "文件改动 (" + item.status + ")",
          body: (item.changes || []).map((c) => c.kind + " " + c.path).join("\n"),
        };
      case "mcp_tool_call":
        return {
          title: "mcp:" + item.server + "." + item.tool + " (" + item.status + ")",
          body: "arguments: " + JSON.stringify(item.arguments, null, 2) + "\n" +
            (item.error ? "error: " + item.error.message : "result: " + JSON.stringify(item.result ?? null, null, 2)),
        };
      case "web_search":
        return { title: "web_search: " + item.query, body: "" };
      case "todo_list":
        return {
          title: "todo",
          body: (item.items || []).map((t) => (t.completed ? "[x] " : "[ ] ") + t.text).join("\n"),
        };
      case "error":
        return { title: "error", body: item.message };
      default:
        return null;
    }
  }

  function renderItem(item, pending) {
    const desc = describeItem(item);
    if (!desc) return;
    let el = itemEls.get(item.id);
    if (!el) {
      el = document.createElement("details");
      el.open = item.type === "todo_list" || item.type === "error";
      const summary = document.createElement("summary");
      const pre = document.createElement("pre");
      el.appendChild(summary);
      el.appendChild(pre);
      log.appendChild(el);
      itemEls.set(item.id, el);
    }
    el.className = "item" + (pending ? " pending" : "");
    el.querySelector("summary").textContent = "⚙ " + desc.title;
    el.querySelector("pre").textContent = desc.body;
    el.scrollIntoView({ behavior: "smooth", block: "end" });
  }

  function handleEvent(event) {
    switch (event.type) {
      case "thread.started":
        threadId = event.thread_id;
        threadInfo.textContent = "thread: " + threadId;
        break;
      case "item.started":
      case "item.updated":
      case "item.completed": {
        const item = event.item;
        if (item.type === "agent_message") {
          if (event.type === "item.completed") addMessage("assistant", item.text);
        } else if (item.type !== "reasoning") {
          renderItem(item, event.type !== "item.completed");
        }
        break;
      }
      case "turn.completed": {
        const u = event.usage;
        const usageEl = document.createElement("div");
        usageEl.className = "usage";
        usageEl.textContent = "tokens: " + u.input_tokens + " in / " + u.output_tokens + " out";
        log.appendChild(usageEl);
        break;
      }
      case "turn.failed":
        addMessage("error", "turn 失败: " + event.error.message);
        break;
      case "error":
        addMessage("error", "错误: " + event.message);
        break;
      default:
        break; // turn.started 等事件不需要渲染
    }
  }

  // POST + SSE:EventSource 只支持 GET,所以用 fetch 读 text/event-stream,
  // 按空行切帧、抠 "data: " 前缀。
  async function streamChat(message) {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ message, threadId }),
    });
    if (!res.ok || !res.body) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || ("HTTP " + res.status));
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      for (;;) {
        const frameEnd = buffer.indexOf("\n\n");
        if (frameEnd === -1) break;
        const frame = buffer.slice(0, frameEnd);
        buffer = buffer.slice(frameEnd + 2);
        for (const line of frame.split("\n")) {
          if (line.startsWith("data: ")) handleEvent(JSON.parse(line.slice(6)));
        }
      }
    }
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage("user", message);
    input.value = "";
    sendBtn.disabled = true;

    try {
      await streamChat(message);
    } catch (err) {
      addMessage("error", "错误: " + (err && err.message ? err.message : String(err)));
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
