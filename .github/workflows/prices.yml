name: Sync model prices

# 把 vendored 价格表(src/o11y/prices.json)在 CI 里定期刷新。
# 运行时不联网:用户拿到的是打包进 src/(files:["src"])的这份快照,cost.ts 纯 readFileSync;
# 这个 workflow 只负责保鲜。同步逻辑只在 CI 跑,所以不进仓库(没有 TS 脚本 / npm script),
# 直接 curl models.dev + jq 转换:第一方 provider 优先取价,跳过 input/output 都为 0 的占位条目
# (否则会制造假 $0),抽 per-1M 单价。变了就提交回 main,下次发版自然带上。

on:
  schedule:
    - cron: "0 6 * * 1" # 每周一 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Refresh prices.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch + transform models.dev pricing
        run: |
          curl -fsSL https://models.dev/api.json | jq '
            . as $api
            | ["anthropic","openai","google","google-vertex-anthropic","deepseek","xai","mistral","meta","groq","cohere","amazon-bedrock","azure"] as $prio
            | ($prio + (($api|keys) - $prio)) as $order
            | reduce $order[] as $prov ({};
                reduce (($api[$prov].models // {}) | to_entries[]) as $m (.;
                  ($m.value.cost) as $c
                  | if (($c.input|type) == "number") and (($c.output|type) == "number")
                       and (($c.input > 0) or ($c.output > 0)) and ((.[$m.key]) == null)
                    then .[$m.key] = ({in: $c.input, out: $c.output}
                        + (if ($c.cache_read|type) == "number" then {cacheRead: $c.cache_read} else {} end)
                        + (if ($c.cache_write|type) == "number" then {cacheWrite: $c.cache_write} else {} end))
                    else . end))
            | (to_entries | sort_by(.key) | from_entries) as $prices
            | {"$source": "models.dev", "$note": "per-1M-token USD prices; regenerated in CI (.github/workflows/prices.yml)", prices: $prices}
          ' > src/o11y/prices.json

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain src/o11y/prices.json)" ]; then
            echo "prices unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/o11y/prices.json
          git commit -m "chore(prices): sync model prices from models.dev"
          git push
