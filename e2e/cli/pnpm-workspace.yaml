# 这个仓库不是 niceeval 根 workspace 的成员,也不属于 e2e/ 的 workspace——空 `packages: []`
# 让 pnpm 把这里当独立项目安装依赖,不再往上层目录找 workspace root(见
# docs/engineering/testing/e2e/README.md §2.1「每个仓库用空 packages: [] 自成 workspace root」)。
# 这样候选 niceeval tarball 注入时解析到的就是本仓库自己的 node_modules,就地调试
# (cd e2e/cli && pnpm install && pnpm e2e)也不会被父目录 workspace 吸收。
packages: []
allowBuilds:
  esbuild: true
