name: Release

# 发版到 npm只有一条路:打 v* 标签、push 到 origin。标签号就是发布版本号,
# CI 自己从标签名解析版本号,在 runner 本地写入 package.json(不写回仓库),
# 然后直接发布。不要求 main 分支上预先提交版本号变更。
#
# 前置:在仓库 Settings → Secrets → Actions 配好 NPM_TOKEN(npm automation token)。
# 包大部分发 TypeScript 源码(package.json files: src + bin,消费侧用 tsx 加载,无 build 步骤);
# 唯一例外是 src/report/**(报告 web 面用到 JSX,tsx 的 JSX 编译按调用进程 cwd 找 tsconfig,
# niceeval 被 link 消费时会退化成 classic JSX、产物引用未定义的全局 React)—— 这部分改发预编译
# ESM(`pnpm run build:report` 产出 dist/report/**,tsconfig.report-build.json),不受消费方
# cwd/tsconfig 影响。`pnpm install`/`pnpm publish` 会经 prepare 生命周期自动触发这一步;下面的
# Build 仍显式跑一遍,方便 CI 失败时定位,也让 Typecheck 针对真实构建产物跑。

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 创建 release 需要
  id-token: write # npm provenance 需要

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Apply release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:report

      - name: Typecheck
        run: pnpm run typecheck

      - name: Publish
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # 预发布版(含 - )发到对应 dist-tag(如 alpha/beta/rc),正式版发 latest。
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing niceeval@$VERSION with dist-tag $DIST_TAG"
          pnpm publish --no-git-checks --provenance --access public --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="$GITHUB_REF_NAME"
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes $PRERELEASE_FLAG
